services:
  db:
    image: postgres:15-alpine
    container_name: sushef-postgres
    environment:
      POSTGRES_DB: sushef_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password123
    ports:
      - "5443:5432"  # Maps local port 5443 to Docker's 5432
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: